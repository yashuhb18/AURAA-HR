{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - AuraHR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space+Grotesk', sans-serif; }
        .glow { text-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }
    </style>
</head>
<body class="bg-[#0f0a1e] text-white min-h-screen flex items-center justify-center overflow-hidden">
    <!-- Animated background elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-purple-600/10 blur-[120px] rounded-full"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-blue-600/10 blur-[120px] rounded-full"></div>
    </div>

    <div class="relative z-10 text-center px-4">
        <h1 class="text-[12rem] font-bold leading-none glow bg-clip-text text-transparent bg-gradient-to-b from-white to-white/20">404</h1>
        <div class="mt-4 space-y-2">
            <h2 class="text-3xl font-semibold tracking-tight text-purple-300">System Link Broken</h2>
            <p class="text-slate-400 max-w-md mx-auto">The resource you're looking for has moved or no longer exists in the AuraHR ecosystem.</p>
        </div>
        
        <div class="mt-12">
            <a href="/" class="inline-flex items-center gap-2 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-bold py-4 px-8 rounded-full transition-all hover:scale-105 hover:shadow-[0_0_30px_rgba(168,85,247,0.4)]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 14.707a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 1.414L7.414 9H15a1 1 0 110 2H7.414l2.293 2.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                Return to Dashboard
            </a>
        </div>
    </div>
</body>
</html>
